name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  swift-build:
    name: Swift build
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Show Swift version
        run: swift --version

      - name: Build debug
        run: swift build

      - name: Build release
        run: swift build -c release
